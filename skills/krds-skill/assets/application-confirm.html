<section class="krds-page-header">
  <h1 class="krds-page-title">신청 내용 확인</h1>
  <p class="krds-page-desc">취소하거나 수정할 수 없는 핵심 정보를 마지막으로 점검합니다.</p>
</section>

<nav class="krds-step-indicator" aria-label="상담 신청 단계">
  <ol class="krds-step-list">
    <li class="krds-step is-done">
      <span class="krds-step-index" aria-hidden="true">1</span>
      <span class="krds-step-label">안내 확인</span>
    </li>
    <li class="krds-step is-done">
      <span class="krds-step-index" aria-hidden="true">2</span>
      <span class="krds-step-label">신청 정보 입력</span>
    </li>
    <li class="krds-step is-current" aria-current="step">
      <span class="krds-step-index" aria-hidden="true">3</span>
      <span class="krds-step-label">확인·확정</span>
    </li>
    <li class="krds-step">
      <span class="krds-step-index" aria-hidden="true">4</span>
      <span class="krds-step-label">신청 완료</span>
    </li>
  </ol>
</nav>

<section class="krds-detail" aria-label="신청 내용 확인">
  <div class="krds-detail-body">
    <div class="krds-alert krds-alert-warning" role="alert">
      이 단계 이후에는 신청 내용을 임의로 수정할 수 없습니다. 연락처와 심사 영향 정보를 먼저 확인해 주세요.
    </div>
  </div>
  <div class="krds-detail-body">
    <h2 class="krds-section-title">핵심 확인 정보</h2>
    <dl class="krds-summary-list">
      <div class="krds-summary-item">
        <dt>상담 유형</dt>
        <dd>기술 상담</dd>
      </div>
      <div class="krds-summary-item">
        <dt>답변 받을 연락처</dt>
        <dd>help@example.org / 02-0000-0000</dd>
      </div>
      <div class="krds-summary-item">
        <dt>취소·수정 불가 항목</dt>
        <dd>보안 등급, 요청 기관명</dd>
      </div>
      <div class="krds-summary-item">
        <dt>심사 영향 정보</dt>
        <dd>시료 반입 예정일, 생물안전 등급</dd>
      </div>
    </dl>
  </div>
  <div class="krds-detail-body">
    <div class="krds-page-actions">
      <button class="krds-btn secondary" type="button">이전 단계로</button>
      <button class="krds-btn primary" type="button">신청 확정</button>
    </div>
  </div>
</section>
