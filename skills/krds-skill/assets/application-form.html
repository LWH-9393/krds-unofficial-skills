<section class="krds-page-header">
  <h1 class="krds-page-title">상담 신청</h1>
  <p class="krds-page-desc">필수 항목을 입력하고 신청 후 처리 상태를 확인합니다.</p>
</section>

<section class="krds-form-panel" aria-label="상담 신청 폼">
  <nav class="krds-step-indicator" aria-label="상담 신청 단계">
    <ol class="krds-step-list">
      <li class="krds-step is-done">
        <span class="krds-step-index" aria-hidden="true">1</span>
        <span class="krds-step-label">안내 확인</span>
      </li>
      <li class="krds-step is-current" aria-current="step">
        <span class="krds-step-index" aria-hidden="true">2</span>
        <span class="krds-step-label">신청 정보 입력</span>
      </li>
      <li class="krds-step">
        <span class="krds-step-index" aria-hidden="true">3</span>
        <span class="krds-step-label">확인·확정</span>
      </li>
      <li class="krds-step">
        <span class="krds-step-index" aria-hidden="true">4</span>
        <span class="krds-step-label">신청 완료</span>
      </li>
    </ol>
  </nav>
  <div class="krds-form-layout">
    <aside class="krds-help-panel-wrap" aria-label="신청 도움 패널">
      <button class="krds-help-panel-toggle" type="button" aria-expanded="true" aria-controls="consult-help-panel">도움말</button>
      <section class="krds-help-panel" id="consult-help-panel" role="region" aria-labelledby="consult-help-title">
        <div class="krds-help-panel-header">
          <h2 class="krds-section-title" id="consult-help-title">신청 도움말</h2>
          <button class="krds-help-panel-close" type="button" aria-label="도움말 패널 닫기">닫기</button>
        </div>
        <p class="krds-help-text">신청 중 막히는 부분이 있으면 도움말과 문의처를 바로 확인할 수 있어야 합니다.</p>
        <ul class="krds-help-links">
          <li><a href="#">자주 묻는 질문 보기</a></li>
          <li><a href="#">신청 예시 문서 보기</a></li>
          <li><a href="#">문의처: 02-0000-0000</a></li>
        </ul>
      </section>
    </aside>
    <div class="krds-form-row">
      <form class="krds-form-grid">
        <section class="krds-form-section">
          <h2 class="krds-section-title">기본 정보</h2>
          <div>
            <label class="krds-form-label" for="consult-title">상담 제목</label>
            <p class="krds-field-help">상담 목적이 드러나는 제목을 간단히 입력해 주세요.</p>
            <input class="krds-input" id="consult-title" type="text" placeholder="예: 이용 신청 관련 문의">
          </div>
          <div>
            <label class="krds-form-label" for="consult-type">상담 유형</label>
            <select class="krds-select" id="consult-type">
              <option>서비스 상담</option>
              <option>기술 상담</option>
              <option>교육 상담</option>
            </select>
          </div>
        </section>
        <section class="krds-form-section">
          <h2 class="krds-section-title">요청 내용</h2>
          <div>
            <label class="krds-form-label" for="consult-content">상담 내용</label>
            <p class="krds-field-help">보안 등급, 희망 일정, 필요한 지원 범위를 함께 적으면 검토가 빨라집니다.</p>
            <textarea class="krds-textarea" id="consult-content" placeholder="상담 목적과 요청사항을 입력합니다."></textarea>
          </div>
        </section>
        <div class="krds-form-actions">
          <button class="krds-btn secondary" type="button">임시 저장</button>
          <button class="krds-btn secondary" type="button">취소</button>
          <button class="krds-btn primary" type="submit">확인 화면으로 이동</button>
        </div>
      </form>
    </div>
  </div>
</section>
