<section class="krds-texture-filter-bar" aria-label="검색 및 필터">
  <div class="krds-texture-filter-grid">
    <div>
      <label class="krds-form-label" for="board-category">구분</label>
      <select class="krds-select" id="board-category">
        <option>전체</option>
        <option>공지</option>
        <option>교육</option>
        <option>점검</option>
      </select>
    </div>
    <div>
      <label class="krds-form-label" for="board-year">연도</label>
      <select class="krds-select" id="board-year">
        <option>2026</option>
        <option>2025</option>
      </select>
    </div>
    <div>
      <label class="krds-form-label" for="board-keyword-type">검색항목</label>
      <select class="krds-select" id="board-keyword-type">
        <option>제목</option>
        <option>제목+내용</option>
      </select>
    </div>
    <div>
      <label class="krds-form-label" for="board-keyword">검색어</label>
      <input class="krds-input" id="board-keyword" type="search" placeholder="검색어를 입력하세요.">
    </div>
  </div>
  <div class="krds-board-meta">
    <p class="krds-texture-total">전체 <strong>128건</strong></p>
    <div class="krds-form-actions">
      <button class="krds-btn secondary" type="button">초기화</button>
      <button class="krds-btn primary" type="submit">검색</button>
    </div>
  </div>
</section>
